name: Auto-ingest from Notes

on:
  schedule:
    - cron: '0 */4 * * *'   # every 4 hours
  workflow_dispatch:          # manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pyramid
        uses: actions/checkout@v4

      - name: Clone notes (public, no auth needed)
        run: |
          git clone --depth 1 https://github.com/Sphinxes0o0/notes.git /tmp/notes-src

      - name: Sync raw sources
        run: |
          rsync -av --delete \
            --exclude='.git' --exclude='node_modules' --exclude='.vitepress' \
            --exclude='README.md' --exclude='CLAUDE.md' \
            --exclude='package.json' --exclude='package-lock.json' \
            /tmp/notes-src/ raw/github/notes/

      - name: Ingest (DeepSeek → MiniMax fallback)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          MINIMAX_CN_API_KEY: ${{ secrets.MINIMAX_CN_API_KEY }}
        run: python3 scripts/ingest_wiki.py . github/notes
